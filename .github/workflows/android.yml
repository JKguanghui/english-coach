name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install NDK
      run: |
        sdkmanager --install "ndk;27.2.12479018"
        
    - name: Clone llama.cpp
      run: |
        git clone --depth 1 https://github.com/ggerganov/llama.cpp.git
        
    - name: Build llama.cpp for Android
      run: |
        cd llama.cpp
        mkdir -p build-android
        cd build-android
        
        # Configure for Android ARM64 - disable all tools and tests
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/27.2.12479018/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=Release \
          -DGGML_VULKAN=OFF \
          -DLLAMA_BUILD_TESTS=OFF \
          -DLLAMA_BUILD_EXAMPLES=OFF \
          -DLLAMA_BUILD_TOOLS=OFF \
          -DBUILD_SHARED_LIBS=ON \
          -DLLAMA_CURL=OFF
          
        # Build only llama and ggml libraries
        make -j$(nproc) llama ggml
        
    - name: Copy native libraries
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        ls -la llama.cpp/build-android/bin/
        cp llama.cpp/build-android/bin/libllama.so app/src/main/jniLibs/arm64-v8a/
        cp llama.cpp/build-android/bin/libggml.so app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
        cp llama.cpp/build-android/bin/libggml-base.so app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
        cp llama.cpp/build-android/bin/libggml-cpu.so app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
        ls -la app/src/main/jniLibs/arm64-v8a/
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'
        
    - name: Build APK
      run: |
        cd app
        chmod +x gradlew 2>/dev/null || true
        gradle assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
